        "@type": "Answer",
        "text": "Both Versions: Games may fail to launch for various reasons. Let's go through a step-by-step checklist to identify and fix the issue. After each step, try launching the game; this helps identify exactly what fixed the problem. Check offline mode settings Games or storefronts set to offline mode can sometimes prevent launching. Check global settings: Go to the storefront tab (Epic/GOG/Amazon/itch) > \u2699\ufe0f Cog Icon and make sure Offline Mode is toggled off Check per-game settings ( Junk Store Pro only): Go to Junk Store > [Your Game] > Press Y > \u2699\ufe0f Cog Icon > Game Configs and check if Offline Mode is enabled for that specific game If you change any settings, make sure to Press X to Save Install any missing game dependencies Missing or broken dependencies can cause launch issues. You may get prompted to install things like Microsoft C++ runtimes when first launching. Easily install any missing dependencies via our built-in dependency installer Update, Verify or repair the game files Corrupted or incomplete installs can be fixed with these tools. Sometimes updates or patches will cause games to no longer launch that used to work. To update game files: Junk Store > [Your Game] > \u2630 Sliders Menu > Update Game To verify game files: Junk Store > [Your Game] > \u2630 Sliders Menu > Verify Game To repair game files: Junk Store > [Your Game] > \u2630 Sliders Menu > Repair Game Change to a GE-Proton version Some games require a more compatible version of Proton. Go to: Junk Store > [Your Game] > Press Y > \u2699\ufe0f Cog Icon > Compatibility Select a GE-Proton version Enable the EOS Overlay (Epic games only) Some Epic games require the Epic Online Services (EOS) overlay to launch properly. Go to: Junk Store > [Your Game] > \u2630 Sliders Menu > Enable EOS Overlay Still not working? Check compatibility resources: First check our Games Tested table to see if your game has been tested with compatibility notes and workarounds. If not found there, visit ProtonDB.com for community tips. You may find game-specific tweaks, compatibility reports, or Proton version recommendations that solve your issue."
