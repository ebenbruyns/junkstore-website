{%- comment -%}
Troubleshooting JSON-LD as FAQPage (Google's only FAQ-style schema —
there's no "TroubleshootingPage" type). Generated from
_data/troubleshooting.json so schema and visible HTML match 1:1.
{%- endcomment -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {%- for item in site.data.troubleshooting -%}
    {
      "@type": "Question",
      "name": {{ item.title | strip_newlines | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.solution | strip_html | strip_newlines | jsonify }}
      }
    }{%- unless forloop.last -%},{%- endunless -%}
    {%- endfor -%}
  ]
}
</script>
