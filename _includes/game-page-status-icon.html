{%- case include.rating -%}
{%- when 'green' -%}<span class="dot dot--green" aria-label="Works out of the box"></span>
{%- when 'yellow' -%}<span class="dot dot--yellow" aria-label="Minor setup needed"></span>
{%- when 'red' -%}<span class="dot dot--red" aria-label="Advanced setup needed"></span>
{%- when 'broken' -%}<svg viewBox="0 0 16 16" width="0.95em" height="0.95em" style="vertical-align:middle" role="img" aria-label="Currently broken"><circle cx="8" cy="8" r="8" fill="#f56565"/><path d="M5.3 5.3 10.7 10.7M10.7 5.3 5.3 10.7" stroke="#16181d" stroke-width="1.8" stroke-linecap="round"/></svg>
{%- when 'unsupported' -%}<svg viewBox="0 0 16 16" width="0.95em" height="0.95em" style="vertical-align:middle" role="img" aria-label="Pro only"><circle cx="8" cy="8" r="6.7" fill="none" stroke="#f56565" stroke-width="1.8"/><path d="M3.7 3.7 12.3 12.3" stroke="#f56565" stroke-width="1.8" stroke-linecap="round"/></svg>
{%- else -%}<span class="dot" aria-label="Untested"></span>
{%- endcase -%}
