<script>
(function () {
  // Lazy-load <video data-lazy-video>: only fetch once scrolled near viewport,
  // then autoplay (muted) so the marketing UX still feels automatic.
  // The include sits at the top of the page (before the video elements), so
  // we have to wait for the DOM to be parsed before wiring anything up.
  function init() {
    var videos = document.querySelectorAll('video[data-lazy-video]');
    if (!videos.length) return;

    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          var v = entry.target;
          v.querySelectorAll('source[data-src]').forEach(function (s) {
            s.src = s.dataset.src;
            s.removeAttribute('data-src');
          });
          v.load();
          var p = v.play();
          if (p && typeof p.catch === 'function') p.catch(function () {});
          obs.unobserve(v);
        });
      }, { rootMargin: '200px' });
      videos.forEach(function (v) { obs.observe(v); });
    } else {
      // Fallback for old browsers — load eagerly
      videos.forEach(function (v) {
        v.querySelectorAll('source[data-src]').forEach(function (s) {
          s.src = s.dataset.src;
          s.removeAttribute('data-src');
        });
        v.load();
        v.play && v.play();
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
