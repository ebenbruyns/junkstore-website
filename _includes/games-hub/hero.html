<!-- Games Hub Hero Section -->
<section class="games-hub-hero">
  <div class="games-hub-hero__content">
    <h1 class="games-hub-hero__title">Steam Deck Game Compatibility</h1>
    <p class="games-hub-hero__subtitle">
      <span id="total-games-count">960+</span> Games Tested Across 4 Stores
    </p>

    <!-- Search & CTA -->
    <div class="games-hub-hero__actions">
      <form class="games-hub-search" action="/games/tested/" method="get" autocomplete="off">
        <input type="text" name="search" placeholder="Search games..." class="games-hub-search__input" id="games-search-input" aria-label="Search games">
        <button type="submit" class="games-hub-search__btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        </button>
        <div class="games-hub-search__suggestions" id="games-search-suggestions"></div>
      </form>
      <a href="/games/tested/" class="games-hub-hero__cta">Browse Full Database →</a>
    </div>
  </div>
</section>
