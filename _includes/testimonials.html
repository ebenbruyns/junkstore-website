<div class="testimonials-section">
  <div id="testimonial-display">
    {%- assign testimonials_sorted = site.data.testimonials | sort: "order" -%}
    {%- for t in testimonials_sorted -%}
    <div class="testimonial-item{% if forloop.first %} active{% endif %}" data-index="{{ forloop.index0 }}">
      <blockquote class="testimonial-quote">"{{ t.text }}"</blockquote>
      <cite class="testimonial-author">— {{ t.name }}</cite>
    </div>
    {%- endfor -%}
  </div>
</div>

<style>
  .testimonials-section {
    max-width: 1000px;
    margin: 1.5rem auto;
    text-align: center;
    padding: 0 2rem;
  }

  /* Desktop: Wide layout, less text wrapping */
  #testimonial-display {
    position: relative;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .testimonial-item {
    opacity: 0;
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    transition: opacity 0.4s ease-in-out;
    padding: 1rem;
    word-wrap: break-word;
    overflow-wrap: break-word;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .testimonial-item.active {
    opacity: 1;
  }

  #testimonial-display .testimonial-quote,
  .testimonials-section blockquote.testimonial-quote {
    font-size: 1.1rem;
    line-height: 1.5;
    font-style: italic;
    margin: 0 0 0.75rem 0;
    color: #e8e8e8;
    border-left: none;
    padding-left: 0;
    padding-right: 0;
    padding: 0;
    background: none;
    text-align: center;
  }

  .testimonial-author {
    font-size: 0.9rem;
    color: #b7aeae;
    font-style: normal;
    font-weight: 500;
  }

  /* Tablet: Moderate text wrapping */
  @media (max-width: 768px) {
    .testimonials-section {
      padding: 0 1.5rem;
    }

    #testimonial-display {
      height: 200px;
    }

    .testimonial-item {
      padding: 1rem 0.5rem;
    }

    .testimonial-quote {
      font-size: 1.05rem;
      margin-bottom: 1rem;
    }

    .testimonial-author {
      font-size: 0.95rem;
    }
  }

  /* Mobile: Narrow screens need more vertical space */
  @media (max-width: 480px) {
    #testimonial-display {
      height: 240px;
    }

    .testimonial-quote {
      font-size: 1rem;
      line-height: 1.6;
    }
  }
</style>
