{% include performance-optimizations.html %}

<!-- Preconnect hints for external domains -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

<!-- Roboto from Google Fonts - deferred for performance -->
<!-- (Lato was previously loaded but no font-family stack referenced it) -->
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"></noscript>

<!-- Font Awesome - deferred for performance. Pinned version (not @latest) so CDN edge cache and browser HTTP cache remain stable across deploys. -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"></noscript>

<!-- Highlight.js CSS for syntax highlighting - deferred -->
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.6.0/styles/default.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.6.0/styles/default.min.css"></noscript>

<!-- Font display optimization to prevent layout shifts.
     'Roboto Fallback' uses local Arial bytes with metrics adjusted to match
     Roboto exactly — so while GF Roboto is loading, the fallback already has
     the right line-height/cap-height. When GF Roboto swaps in, no layout
     shift. Standard Capsize-derived overrides. -->
<style>
/* Capsize-derived metric-override fallback for Roboto. Aliases local
   Arial bytes but with metrics adjusted to match Roboto so line-height
   and cap-height match before Roboto swaps in. Must sit BEFORE the
   system fonts in the font-family stack to be selected on first paint. */
@font-face {
  font-family: 'Roboto Fallback';
  src: local('Arial'), local('Helvetica'), local('Liberation Sans'), local('Nimbus Sans');
  size-adjust: 100.06%;
  ascent-override: 92.49%;
  descent-override: 24.34%;
  line-gap-override: 0%;
}
</style>

<!-- Mobile performance optimizations -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="{{ '/favicon-steamdeck.ico' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon-steamdeck.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="mask-icon" href="{{ '/safari-pinned-tab.svg' | relative_url }}" color="#FF6600">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">

<!-- Cookie Consent with Accept/Decline -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.css"></noscript>
<style>
  /* Cookie banner styling — position fixed inline so the JS-injected
     element doesn't briefly render in document flow before the CDN CSS
     loads (was causing ~0.4 CLS on every page). */
  .cc-window {
    position: fixed !important;
    bottom: 1rem !important;
    right: 1rem !important;
    min-width: 300px !important;
    max-width: 350px !important;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5) !important;
    border-radius: 8px !important;
    z-index: 9999 !important;
    padding: 1.5rem !important;
    font-size: 14px !important;
    line-height: 1.4 !important;
  }
  .cc-message { margin-bottom: 1rem !important; display: block !important; }
  .cc-compliance { display: flex !important; gap: 0.5rem !important; flex-wrap: wrap !important; }
  .cc-btn { padding: 0.5rem 1rem !important; border-radius: 4px !important; font-weight: bold !important; border: none !important; cursor: pointer !important; font-size: 13px !important; }
  .cc-allow { background: #f1d600 !important; color: #000 !important; }
  .cc-deny { background: #666 !important; color: #fff !important; }
  .cc-link { color: #f1d600 !important; text-decoration: underline !important; }

  /* Promo banner — reserve sizing in head so the banner renders at
     correct dimensions on first paint. Without this, the banner element
     parses before its own <style> in promo-banner.html (since both live
     in body), so it briefly renders as a default <div> (no padding,
     ~32px tall) then reflows to ~76px when the inline <style> parses,
     pushing all body content down ~44px. Full styling (gradient, etc.)
     stays in the include — only the dimension-affecting rules are here. */
  .promo-banner {
    padding: 1.1rem 1.5rem;
    font-size: 1.15rem;
    line-height: 1.6;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 3px solid #00adb5;
  }
  @media (max-width: 600px) {
    .promo-banner {
      font-size: 1rem;
      padding: 0.9rem 2.5rem 0.9rem 1rem;
    }
  }

  /* Critical masthead/nav layout — without this, the nav <ul>/<li>
     elements render with default list styles (vertical, bulleted,
     padding-left: 40px) before main.css loads, making the masthead
     briefly tall, then snapping to the flex-row layout when main.css
     arrives. That's a ~80px+ shift on every page. Mirrors
     _sass/junkstore/_layout.scss minimums. */
  .js-masthead {
    background: #252a34;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #444;
  }
  .js-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: nowrap;
    padding: 0.75rem 0;
    gap: 1rem;
  }
  .js-nav__brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .js-nav__links {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 0.5rem;
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .js-nav__item { margin: 0; }
  .js-nav__link { display: block; padding: 0.5rem 0.6rem; }
  .js-container { max-width: 1280px; width: 98%; margin: 0 auto; padding: 0 1rem; }
  .nav-cta-button {
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
    padding: 0.35rem 0.9rem;
    border-radius: 4px;
    font-size: 0.85em;
    font-weight: 600;
    white-space: nowrap;
    margin-left: auto;
    margin-right: 0.5rem;
  }
  .js-nav__search {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }
  .js-nav__logo { display: flex; align-items: center; }
  .js-nav__logo img { height: 55px; width: auto; max-width: none; }

  /* Critical hero wrapper + title — without these, the wrapper has no
     max-width / padding until main.css loads (deferred), so the H1
     re-flows when main.css arrives, shifting the whole hero content
     area. Locks layout at first paint. Mirrors hero-height-fix.scss. */
  .js-hero--overlay .js-hero__wrapper {
    position: relative;
    z-index: 2;
  }
  .layout--splash .page__hero--overlay .wrapper,
  .js-hero__wrapper {
    width: 100%;
    max-width: 1200px;
    padding: 0 2rem;
    text-align: left;
  }
  .layout--splash .page__hero--overlay .page__title,
  .js-hero__title {
    font-size: 2.25rem;
    margin-top: 0;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }
  @media (max-width: 768px) {
    .layout--splash .page__hero--overlay .page__title,
    .js-hero__title { font-size: 2rem; }
  }
  @media (max-width: 480px) {
    .layout--splash .page__hero--overlay .page__title,
    .js-hero__title { font-size: 1.75rem; }
  }

  /* Critical hero height — inlined so the splash hero reserves its
     final dimensions at first paint, before the async-loaded main.css
     applies. Without this, the hero renders at content-height (~99px)
     then jumps to 220px when main.css arrives, causing ~0.2 CLS on
     splash pages (homepage, /features/, /status/, etc.). */
  .layout--splash .page__hero--overlay,
  .js-hero--overlay {
    min-height: 220px;
    height: 220px;
    max-height: 220px;
  }
  @media (max-width: 768px) {
    .layout--splash .page__hero--overlay,
    .js-hero--overlay {
      min-height: 250px;
      height: 250px;
      max-height: 250px;
    }
  }
  @media (max-width: 480px) {
    .layout--splash .page__hero--overlay,
    .js-hero--overlay {
      min-height: 220px;
      height: auto;
      max-height: none;
    }
  }
</style>

        allow: "Accept",
        deny: "Decline",
        link: "Privacy Policy",
        href: "/privacy-policy"
      },
      onStatusChange: function(status, chosenBefore) {
        var didConsent = this.hasConsented();
        if (didConsent) {
          loadAnalytics();
        } else {

        }

    });
    // Fix privacy policy link target
    var learnMoreLink = document.querySelector(".cc-window .cc-link");
    if (learnMoreLink) {
      learnMoreLink.setAttribute("target", "_self");
    }
  });
