# Cloudflare Worker Configuration
# Deploy with: wrangler deploy

name = "junkstore-firebase-cache"
main = "firebase-cache.js"
compatibility_date = "2024-01-01"

# Account settings (uncomment and set your account ID)
# account_id = "your-account-id-here"

# Custom domain (optional - set up in Cloudflare dashboard)
# routes = [
#   { pattern = "api.junkstore.xyz/*", zone_name = "junkstore.xyz" }
# ]

# Environment variables (optional - can also be set in dashboard)
[vars]
FIREBASE_PROJECT = "junkstore-website"

# Development settings
[dev]
port = 8787
local_protocol = "http"
