<svg width="495" height="296" viewBox="0 0 495 296" fill="none" xmlns="http://www.w3.org/2000/svg"
     style="transform: perspective(800px) rotateX(-12deg); transform-origin: center bottom;">
    <defs>
        <!-- Gradient for orange JS cord - viewed from below looking up -->
        <!-- Light at top (viewer looking up), dark at bottom (bottom of J curve in shadow) -->
        <linearGradient id="cordGradient" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%" style="stop-color:#994D26"/>   <!-- Very dark at bottom curve -->
            <stop offset="15%" style="stop-color:#B35C33"/>  <!-- Dark lower section -->
            <stop offset="40%" style="stop-color:#CC7A4D"/>  <!-- Mid-dark -->
            <stop offset="70%" style="stop-color:#FFA366"/>  <!-- Normal orange -->
            <stop offset="100%" style="stop-color:#FFB880"/> <!-- Bright at top -->
        </linearGradient>

        <!-- Gradient for blue controller - viewed from below looking up -->
        <linearGradient id="blueGradient" x1="50%" y1="100%" x2="50%" y2="0%">
            <stop offset="0%" style="stop-color:#3D7A99"/>   <!-- Darker at bottom -->
            <stop offset="40%" style="stop-color:#4A99CC"/>
            <stop offset="70%" style="stop-color:#66BFFF"/>
            <stop offset="100%" style="stop-color:#8CD4FF"/> <!-- Lighter at top -->
        </linearGradient>

        <!-- Gradient for dark buttons -->
        <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6E6763"/>
            <stop offset="100%" style="stop-color:#3D3836"/>
        </linearGradient>

        <!-- Subtle shadow for main elements - softer for 3D effect -->
        <filter id="mainShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
        </filter>

        <!-- Softer shadow for smaller elements -->
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
        </filter>

        <!-- Inner glow/highlight effect -->
        <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <feOffset dx="-1" dy="-1" result="offsetBlur"/>
            <feFlood flood-color="#FFFFFF" flood-opacity="0.3"/>
            <feComposite in2="offsetBlur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

