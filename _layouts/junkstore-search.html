---
layout: junkstore-default
---

<article class="js-page js-search">
  <div class="js-container">
    <header class="js-page__header">
      <h1 class="js-page__title">{{ page.title | default: "Search" }}</h1>
      {% if page.excerpt %}
        <p class="js-page__excerpt">{{ page.excerpt }}</p>
      {% endif %}
    </header>

    <div class="js-search__form">
      <input type="text" id="search" class="js-search__input" placeholder="Enter your search term..." autofocus />
    </div>

    <div class="js-search__results">
      <div id="results" class="js-search__list"></div>
    </div>

    {{ content }}
  </div>
</article>

<style>
.js-search__form {
  margin-bottom: 2rem;
}

.js-search__input {
  width: 100%;
  padding: 1rem 1.25rem;
  font-size: 1.1rem;
  background: #1e2a38;
  border: 2px solid #3a4a5c;
  border-radius: 8px;
  color: #fff;
  transition: all 0.2s ease;
}

.js-search__input:focus {
  outline: none;
  border-color: #66bfff;
  box-shadow: 0 0 0 3px rgba(102, 191, 255, 0.2);
}

.js-search__input::placeholder {
  color: #888;
}

.js-search__results {
  min-height: 200px;
}

.js-search__list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Search result items - styled by lunr.js output */
.js-search__list .archive__item {
  background: #1e2a38;
  border: 1px solid #3a4a5c;
  border-radius: 8px;
  padding: 1.25rem;
  transition: all 0.2s ease;
}

.js-search__list .archive__item:hover {
  border-color: #66bfff;
  transform: translateY(-2px);
}

.js-search__list .archive__item-title {
  margin: 0 0 0.5rem 0;
  font-size: 1.2rem;
}

.js-search__list .archive__item-title a {
  color: #66bfff;
  text-decoration: none;
}

.js-search__list .archive__item-title a:hover {
  color: #cceeff;
}

.js-search__list .archive__item-excerpt {
  color: #ccc;
  font-size: 0.95rem;
  line-height: 1.5;
  margin: 0;
}

/* No results message */
.js-search__list:empty::after {
  content: "Start typing to search...";
  color: #888;
  font-style: italic;
}
</style>
