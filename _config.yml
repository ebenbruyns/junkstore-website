# SEO/Analytics
# google_analytics: # Optional
# bing_site_verification:   # Optional
analytics:
  provider: false  # Disabled - cookie consent handles analytics loading
  google:
    tracking_id: "G-E2Y00GCMSG"   # GA4 ID kept for reference
    anonymize_ip: true

# Permalinks
permalink: /:categories/:title/

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Static asset caching for performance
# These headers will be set by GitHub Pages or can be configured in hosting
staticfiles:
  - /assets/images/
  - /assets/css/
  - /assets/js/

# Output
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - docs/
  - "*.backup"
  - "*.sh"
  - test
  - assets/lib/
  - assets/images/backups/
  - tested-games-new/
  - _archive/
  - cloudflare-worker/
keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

navigation:
  main: main
  sidebar: sidebar-sample

logo: "/assets/images/js-steamdeck-logo-lighter.svg"

# Site search functionality
search: true
lunr:
  search_within_pages: true

enable_copy_code_button: true

google_analytics:
  id: "G-E2Y00GCMSG" # replace with your actual Google Analytics Measurement ID

