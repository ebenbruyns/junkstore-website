# Basic Site Settings
title: "Junk Store"
email: "junkstore@sdk.co.nz"
description: "Play non-Steam games on your Steam Deck with ease."
baseurl: "" # root
url: "https://www.junkstore.xyz" # your real live URL
repository: "mrsjunkrunner/mrsjunkrunner.github.io"
timezone: Pacific/Auckland

# Theme Settings
# Using custom Junk Store theme (minimal-mistakes removed)
theme: null
locale: "en-US"

# Site-Wide Open Graph Image (for social previews)
og_image: /assets/images/site/junkstore-og-1200x630.png

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-paginate

# Feed configuration
feed:
  excerpt_only: true
  logo: https://www.junkstore.xyz/assets/images/site/JSAvatar-48.webp

# Markdown and Kramdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: false
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections
collections:
  tutorials:
    output: true
    permalink: /:path/
  troubleshooting:
    output: true
    permalink: /:path/
  pages:
    output: true
    permalink: /:path/
  posts:
    output: true
    permalink: /blog/:slug/


# Categories
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: junkstore-archive
  permalinks:
    category: /blog/category/:name/
    tag: /blog/tag/:name/

# Tag archive configuration
tag_archive:
  type: jekyll-archives
  path: /tags/


